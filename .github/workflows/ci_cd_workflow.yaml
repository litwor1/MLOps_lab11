name: CI/CD workflow

on: workflow_dispatch

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: sentiment-app-onnx
  STACK_NAME: sentiment-app-onnx-stack

jobs:
  integration:
    name: checks_and_tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code repo
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group integration

      - name: Run Ruff check
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest tests/

  deployment:
    name: deploy_to_lambda
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - name: Checkout code repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      # 1. Najpierw przygotowujemy pliki modelu
      - name: Install deployment dependencies
        run: uv sync --group deployment

      - name: Prepare model from HuggingFace Hub
        run: uv run python -m src.scripts.prepare_model_from_hf

      - name: Export model to ONNX
        run: uv run python -m src.scripts.export_zeroshot_to_onnx

      # 2. Logujemy się do ECR, żeby pobrać adres rejestru (Registry URL)
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: "true"

      # 3. Budujemy i wysyłamy obraz (teraz pliki ONNX już istnieją)
      - name: Build and Push Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REPOSITORY:$IMAGE_TAG .
          docker tag $REPOSITORY:$IMAGE_TAG $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      # 4. Rozwiązujemy rolę IAM i czyścimy ewentualny rollback
      - name: Delete stack if in rollback state
        run: bash scripts/recover_rollback.sh
        env:
          STACK_NAME: ${{ env.STACK_NAME }}
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: Resolve Lambda role ARN from name
        id: lambda_role
        run: bash scripts/resolve_lambda_role.sh
        env:
          ROLE_NAME: LabRole

      # 5. Na samym końcu wdrażamy, używając gotowego obrazu z ECR
      - name: Deploy with AWS SAM
        run: bash scripts/sam_deploy.sh
        env:
          STACK_NAME: ${{ env.STACK_NAME }}
          AWS_REGION: ${{ env.AWS_REGION }}
          IMAGE_REPOSITORY: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          IMAGE_URI: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          LAMBDA_ROLE_ARN: ${{ steps.lambda_role.outputs.role_arn }}
