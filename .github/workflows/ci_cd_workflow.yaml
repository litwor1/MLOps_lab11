name: CI/CD workflow

on: workflow_dispatch

# Zmienne środowiskowe na poziomie workflow
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: MLOps_lab11

jobs:
  integration:
    name: checks_and_tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code repo
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        # sync instaluje paczki produkcyjne + te z grupy integration
        run: uv sync --group integration

      - name: Run Ruff check
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest tests/

  deployment:
    name: deploy_to_lambda
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - name: Checkout code repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install deployment dependencies
        # Synchronizuje grupę deployment (transformers, torch, onnx) potrzebną do eksportu
        run: uv sync --group deployment

      - name: Prepare model from HuggingFace Hub
        run: uv run python -m src.scripts.prepare_model_from_hf

      - name: Export model to ONNX
        run: uv run python -m src.scripts.export_zeroshot_to_onnx

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: "true"

      - name: Build and Push Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REPOSITORY:$IMAGE_TAG .
          docker tag $REPOSITORY:$IMAGE_TAG $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
